name: Build SporThick.HIIT-o-Maniac

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios-and-watchos:
    runs-on: macos-latest

    env:
      DEVELOPMENT_TEAM: ""  # Пустая переменная — обходим требование Team ID
      CODE_SIGN_IDENTITY: "-"  # Отключаем подпись


    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version

    - name: Build and archive iOS app (no signing)
      run: |
        xcodebuild \
          -project SporThick.xcodeproj \
          -scheme SporThick \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -archivePath build/SporThick-iOS.xcarchive \
          CODE_SIGN_IDENTITY="-" \
          DEVELOPMENT_TEAM="" \
          archive

    - name: Export iOS .ipa (no signing)
      run: |
        mkdir -p artifacts/ios
        xcrun xcodebuild \
          -exportArchive \
          -archivePath build/SporThick-iOS.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath artifacts/ios/

    - name: Upload artifacts
      uses: upload-artifact@v4
      with:
        name: sporthick-builds
        path: artifacts/
        retention-days: 7
