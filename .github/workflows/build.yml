name: Build SporThick.HIIT-o-Maniac

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        # Используем актуальную версию Xcode
        sudo xcode-select -s /Applications/Xcode_16.app 
        xcodebuild -version

    - name: Build iOS app (No Signing)
      run: |
        # Собираем архив, отключая все проверки подписи
        xcodebuild archive \
          -project SporThick.xcodeproj \
          -scheme SporThick \
          -destination 'generic/platform=iOS' \
          -configuration Release \
          -archivePath build/SporThick-iOS.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          CODE_SIGN_IDENTITY=""

    - name: Create IPA (Manual Packaging)
      run: |
        # Создаем структуру IPA без использования exportOptions.plist
        mkdir -p artifacts/Payload
        cp -r build/SporThick-iOS.xcarchive/Products/Applications/*.app artifacts/Payload/
        cd artifacts
        zip -r SporThick.ipa Payload
        rm -rf Payload

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SporThick-Unsigned-IPA
        path: artifacts/SporThick.ipa
        retention-days: 7
