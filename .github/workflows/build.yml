name: Build SporThick.HIIT-o-Maniac

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios-and-watchos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version

    - name: Build and archive iOS app
      run: |
        xcodebuild \
          -project SporThick.xcodeproj \
          -scheme SporThick \
          -configuration Release \
          -archivePath build/SporThick-iOS.xcarchive \
          archive

    - name: Export iOS .ipa
      run: |
        mkdir -p artifacts/ios
        xcrun xcodebuild \
          -exportArchive \
          -archivePath build/SporThick-iOS.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath artifacts/ios/

    - name: Build and archive watchOS app
      run: |
        xcodebuild \
          -project SporThick.xcodeproj \
          -scheme "SporThick WatchKit App" \
          -configuration Release \
          -archivePath build/SporThick-watchOS.xcarchive \
          archive

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sporthick-builds
        path: artifacts/
        retention-days: 7
